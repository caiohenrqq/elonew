name: elonew-prod

x-shared-app-image: &shared-app-image ${APP_IMAGE:-elonew-prod:latest}

x-app-image-build: &app-image-build
  context: ../../..
  dockerfile: infrastructure/docker/prod/Dockerfile.prod

x-postgres-connection-url: &postgres-connection-url postgresql://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infrastructure/docker/prod/.env}@database:5432/elonew

x-log-rotation: &log-rotation
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'

services:
  database:
    <<: *log-rotation
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: elonew
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infrastructure/docker/prod/.env}
    volumes:
      - elonew_postgres_prod_data:/var/lib/postgresql/data
    networks: [private-backend]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d elonew']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    <<: *log-rotation
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - elonew_redis_prod_data:/data
    networks: [private-backend]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    <<: *log-rotation
    build: *app-image-build
    image: *shared-app-image
    restart: 'no'
    working_dir: /workspace/packages/database
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: *postgres-connection-url
    networks: [private-backend]
    command: ['pnpm', 'exec', 'prisma', 'migrate', 'deploy']

  api:
    <<: *log-rotation
    build: *app-image-build
    image: *shared-app-image
    restart: unless-stopped
    working_dir: /workspace/apps/api
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ./api.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: *postgres-connection-url
      REDIS_URL: redis://redis:6379
      CHAT_SOCKET_ALLOWED_ORIGINS: ${PUBLIC_WEB_ORIGIN}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:?set WEB_SESSION_SECRET in infrastructure/docker/prod/.env}
    networks: [private-backend, public-edge]
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    command: ['node', 'dist/main']

  workers:
    <<: *log-rotation
    build: *app-image-build
    image: *shared-app-image
    restart: unless-stopped
    working_dir: /workspace/apps/workers
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    env_file:
      - ./workers.env
    environment:
      NODE_ENV: production
      API_INTERNAL_BASE_URL: http://api:3000
      DATABASE_URL: *postgres-connection-url
      REDIS_URL: redis://redis:6379
    networks: [private-backend]
    command: ['pnpm', 'exec', 'tsx', 'src/main.ts']

  cloudflared:
    <<: *log-rotation
    image: cloudflare/cloudflared:${CLOUDFLARED_VERSION:-2026.5.2}
    restart: unless-stopped
    command:
      [
        'tunnel',
        '--no-autoupdate',
        'run',
        '--token',
        '${TUNNEL_TOKEN:?set TUNNEL_TOKEN in infrastructure/docker/prod/.env}',
      ]
    networks: [public-edge]
    depends_on:
      api:
        condition: service_started

networks:
  public-edge:
  private-backend:
    internal: true

volumes:
  elonew_postgres_prod_data:
  elonew_redis_prod_data:
