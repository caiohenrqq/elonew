name: CI/CD

on:
  pull_request:
    branches: [main]
  release:
    types: [released]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  checks:
    name: Lint, typecheck, build & tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace

      - name: Lint & format
        run: pnpm biome:check:all

      - name: Typecheck API
        run: pnpm api exec tsc --noEmit -p tsconfig.json

      - name: Typecheck web
        run: pnpm web exec tsc --noEmit -p tsconfig.json

      - name: API unit tests
        run: pnpm api test:unit

      - name: API integration tests
        run: pnpm api test:integration

      - name: Web tests
        run: pnpm web test

      - name: Worker tests
        run: pnpm workers test

      - name: Build API & web
        run: pnpm api build && pnpm web build

  database:
    name: DB-backed API tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elonew_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d elonew_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elonew_test
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace

      - name: Apply migrations
        run: pnpm --filter @packages/database exec prisma migrate deploy

      - name: API integration (db) tests
        run: pnpm --filter api exec jest --config ./test/jest-integration-db.json --runInBand

      - name: API e2e (db) tests
        run: pnpm --filter api exec jest --config ./test/jest-e2e-db.json --runInBand

  web-e2e:
    name: Web browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elonew
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d elonew"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace

      - name: Prepare application
        run: |
          pnpm db:migrate:deploy
          pnpm db:seed:dev
          pnpm api build

      - name: Install Chromium
        run: pnpm web exec playwright install --with-deps chromium

      - name: Run browser tests
        run: |
          pnpm api start:prod > /tmp/elonew-api.log 2>&1 &
          api_pid=$!
          trap 'kill "$api_pid"' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3000/health; then
              pnpm web test:e2e
              exit
            fi
            sleep 2
          done
          cat /tmp/elonew-api.log
          exit 1

  deploy:
    name: Deploy production
    if: github.event_name == 'release'
    needs: [checks, database, web-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag belongs to main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - uses: pnpm/action-setup@v6

      - name: Build Vercel production artifact
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Configure VPS SSH access
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Deploy VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -p 22022 admin@"$VPS_HOST" 'bash -s' -- "$GITHUB_REF_NAME" <<'REMOTE'
          set -euo pipefail
          tag=$1
          cd /opt/elonew/elonew
          git fetch --force --tags origin
          git checkout --detach "refs/tags/$tag"
          docker compose --env-file infrastructure/docker/prod/.env \
            -f infrastructure/docker/prod/compose.yml up -d --build
          for attempt in {1..30}; do
            curl --fail --silent --show-error https://api.elonew.com.br/health && exit 0
            sleep 5
          done
          docker compose --env-file infrastructure/docker/prod/.env \
            -f infrastructure/docker/prod/compose.yml ps
          exit 1
          REMOTE

      - name: Deploy Vercel
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
